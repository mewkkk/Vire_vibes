<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIRE</title>
    <link rel="stylesheet" href="stylesheets/reset.css" />
    <link rel="stylesheet" href="stylesheets/layout.css" />
    <link rel="stylesheet" href="stylesheets/adaptive.css" />
  </head>
  <body>
    <canvas class="cursor_swarm" id="cursor_swarm" aria-hidden="true"></canvas>

    <div class="help_note" id="help_note" aria-hidden="true">
      <div class="help_note__back"></div>
      <div class="help_note__box" role="dialog" aria-modal="true" aria-labelledby="help_note_text">
        <button class="help_note__close" id="help_note_close" type="button" aria-label="Закрыть подсказку">
          +
        </button>
        <p class="help_note__text" id="help_note_text"></p>
      </div>
    </div>

    <main class="page">
      <section class="screen1" id="screen1">
        <img
          class="screen1__vine"
          src="assets/screen1/download (23) 1.svg"
          alt="Фотография лиан"
        />

        <div class="screen1__glow glow_one"></div>
        <div class="screen1__glow glow_two"></div>
        <div class="screen1__glow glow_three"></div>

        <img
          class="screen1__line line_left"
          src="assets/screen1/Group 111.svg"
          alt="Декоративная левая линия"
        />
        <img
          class="screen1__line line_right"
          src="assets/screen1/Group 112.svg"
          alt="Декоративная правая линия"
        />

        <div class="screen1__content">
          <div class="logo" id="logo">
            <h1 class="sr-only">VIRE</h1>
            <canvas
              class="logo_canvas"
              id="logo_canvas"
              aria-hidden="true"
            ></canvas>
          </div>

          <p class="screen1__subtitle">Тишина климата. Работа природы</p>
        </div>
      </section>

      <section class="screen2" id="screen2">
        <div class="screen2__glow glow_left"></div>
        <div class="screen2__glow glow_right"></div>

        <div class="screen2__rings rings_left"></div>
        <div class="screen2__rings rings_right"></div>

        <div class="screen2__icons">
          <img src="assets/screen2/Ellipse 81.svg" alt="" />
          <img src="assets/screen2/Ellipse 87.svg" alt="" />
          <img src="assets/screen2/Ellipse 88.svg" alt="" />
          <button class="screen2__question" id="screen2_help" type="button" aria-label="Подсказка">?</button>
        </div>

        <div class="screen2__top">
          <h2 class="screen2__title">Настрой свой климат</h2>
          <div class="screen2__title_lines">
            <img
              class="screen2__title_line line_cool"
              src="assets/screen2/Vector 311.svg"
              alt=""
            />
            <img
              class="screen2__title_line line_warm"
              src="assets/screen2/Vector 312.svg"
              alt=""
            />
          </div>
        </div>

        <div class="screen2__plant">
          <canvas
            class="screen2__canvas"
            id="screen2_canvas"
            aria-label="Интерактивный фрактал климата"
          ></canvas>
        </div>

        <div class="screen2__controls">
          <div class="screen2__slider">
            <div class="screen2__slider_row">
              <span>сухо</span>
              <input
                class="screen2__range"
                id="humidity_slider"
                type="range"
                min="0"
                max="100"
                value="62"
              />
              <span>влажно</span>
            </div>
          </div>

          <div class="screen2__slider">
            <div class="screen2__slider_row">
              <span>холодно</span>
              <input
                class="screen2__range"
                id="temperature_slider"
                type="range"
                min="0"
                max="100"
                value="54"
              />
              <span>жарко</span>
            </div>
          </div>
        </div>
      </section>

      <section class="screen3" id="screen3">
        <button class="screen3__question" id="screen3_help" type="button" aria-label="Подсказка">?</button>

        <div class="screen3__top">
          <div class="screen3__title_lines">
            <img
              class="screen3__title_line line_top"
              src="assets/screen2/Vector 312.svg"
              alt=""
            />
            <img
              class="screen3__title_line line_middle"
              src="assets/screen2/Vector 311.svg"
              alt=""
            />
            <h2 class="screen3__title">Изучи ассортимент</h2>
            <img
              class="screen3__title_line line_bottom"
              src="assets/screen2/Vector 311.svg"
              alt=""
            />
            <img
              class="screen3__title_line line_accent"
              src="assets/screen2/Vector 312.svg"
              alt=""
            />
          </div>
        </div>

        <img
          class="screen3__back"
          src="assets/screen3/Group 104.svg"
          alt=""
        />

        <div class="screen3__plants" id="screen3_plants">
          <article
            class="plant plant1"
            tabindex="0"
          >
            <img src="assets/screen3/download (44) 2.png" alt="Голубое растение слева" />
            <img class="plant_card card_right" src="assets/screen3/Group 129.svg" alt="Карточка растения SPORA-N4" />
          </article>

          <article
            class="plant plant2"
            tabindex="0"
          >
            <img src="assets/screen3/download (41) 2.png" alt="Сухоцвет слева" />
            <img class="plant_card card_right" src="assets/screen3/Group 134.svg" alt="Карточка растения FILUM-A3" />
          </article>

          <article
            class="plant plant3"
            tabindex="0"
          >
            <img src="assets/screen3/download (46) 3.png" alt="Оранжевый гербарий слева" />
            <img class="plant_card card_right" src="assets/screen3/Group 130.svg" alt="Карточка растения HELIA-T5" />
          </article>

          <article
            class="plant plant4"
            tabindex="0"
          >
            <img src="assets/screen3/download (47) 2.png" alt="Оранжевый гербарий справа" />
            <img class="plant_card card_left" src="assets/screen3/Group 131.svg" alt="Карточка растения SOLIS-T6" />
          </article>

          <article
            class="plant plant5"
            tabindex="0"
          >
            <img src="assets/screen3/download (38) 2.png" alt="Голубые цветы справа" />
            <img class="plant_card card_left" src="assets/screen3/Group 132.svg" alt="Карточка растения AERIS-L1" />
          </article>

          <article
            class="plant plant6"
            tabindex="0"
          >
            <img src="assets/screen3/download (37) 2.png" alt="Сухоцвет справа" />
            <img class="plant_card card_left" src="assets/screen3/Group 133.svg" alt="Карточка растения NUBIS-V2" />
          </article>

          <div class="screen3__card_spot" id="screen3_card_spot" aria-hidden="true">
            <img class="screen3__card_view" id="screen3_card_view" alt="" />
          </div>
        </div>
      </section>

      <section class="screen4" id="screen4">
        <div class="screen4__top">
          <div class="screen4__title_box">
            <h2 class="screen4__title">Создай свое растение</h2>
            <img
              class="screen4__title_line line_green"
              src="assets/screen4/Vector 316.svg"
              alt=""
            />
            <img
              class="screen4__title_line line_orange"
              src="assets/screen4/Vector 317.svg"
              alt=""
            />
          </div>

          <div class="screen4__buttons">
            <button
              class="screen4__button screen4__reset"
              id="screen4_reset"
              type="button"
              aria-label="Начать заново"
            >
              <img src="assets/screen4/Frame 335.svg" alt="" />
            </button>

            <button
              class="screen4__button screen4__help"
              id="screen4_help"
              type="button"
              aria-label="Подсказка"
            >
              <img src="assets/screen4/Frame 331.svg" alt="" />
            </button>
          </div>
        </div>

        <div class="screen4__stage">
          <img
            class="screen4__side_line side_left"
            src="assets/screen4/Vector 334.svg"
            alt=""
          />
          <img
            class="screen4__side_line side_right"
            src="assets/screen4/Vector 335.svg"
            alt=""
          />

          <div class="elements panel_left">
            <button
              class="element element_big"
              type="button"
            >
              <img src="assets/screen4/Vector-4.svg" alt="Элемент 1" draggable="false" />
            </button>

            <button
              class="element"
              type="button"
            >
              <img src="assets/screen4/Group.svg" alt="Элемент 2" draggable="false" />
            </button>

            <button
              class="element"
              type="button"
            >
              <img src="assets/screen4/Vector-1.svg" alt="Элемент 3" draggable="false" />
            </button>
          </div>

          <div class="elements panel_right">
            <button
              class="element element_big"
              type="button"
            >
              <img src="assets/screen4/Vector.svg" alt="Элемент 4" draggable="false" />
            </button>

            <button
              class="element"
              type="button"
            >
              <img src="assets/screen4/Vector-2.svg" alt="Элемент 5" draggable="false" />
            </button>

            <button
              class="element"
              type="button"
            >
              <img src="assets/screen4/Vector-3.svg" alt="Элемент 6" draggable="false" />
            </button>
          </div>

          <div class="screen4__center">
            <div class="screen4__drop_zone" id="screen4_drop_zone">
              <img
                class="screen4__drop_circle"
                src="assets/screen4/circle.svg"
                alt=""
              />
              <div class="screen4__drop_text">
                <p>Перетащи элементы</p>
                <p>в круг</p>
              </div>
              <div class="screen4__preview" id="screen4_preview"></div>
            </div>

            <div class="screen4__plant_box" id="screen4_plant_box" aria-live="polite">
              <img
                class="screen4__plant_base"
                src="assets/screen4/Bazaart (5) 2.svg"
                alt=""
              />
              <div class="screen4__plant_mask">
                <img
                  class="screen4__plant_image"
                  src="assets/screen4/download (46) 2.svg"
                  alt="Созданное растение"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="screen5" id="screen5">
        <div class="screen5__top">
          <div class="screen5__line_group group_left" aria-hidden="true">
            <img class="screen5__line line_green" src="assets/screen5/Vector 322.svg" alt="" />
            <img class="screen5__line line_orange" src="assets/screen5/Vector 323.svg" alt="" />
          </div>

          <h2 class="screen5__title">Вырасти свой цветок</h2>

          <div class="screen5__line_group group_right" aria-hidden="true">
            <img class="screen5__line line_green" src="assets/screen5/Vector 326.svg" alt="" />
            <img class="screen5__line line_orange" src="assets/screen5/Vector 327.svg" alt="" />
          </div>

          <button class="screen5__question" id="screen5_help" type="button" aria-label="Подсказка">?</button>
        </div>

        <div class="screen5__stage">
          <img
            class="screen5__ground"
            id="screen5_ground"
            src="assets/screen5/download (20) 1.svg"
            alt="Поле для выращивания цветка"
          />
          <div class="screen5__flowers" id="screen5_flowers" aria-live="polite"></div>
        </div>

        <div class="screen5__credits">
          <p class="screen5__credit credit_left">Софинская Мария<br />Б25Д311</p>
          <p class="screen5__credit credit_right">Кураторы:<br />Цветников Николай, Комкова Анна</p>
        </div>
      </section>
    </main>

    <script src="js/animation.js"></script>
  </body>
</html>
